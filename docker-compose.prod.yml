version: '3.8'
services:
  redis:
    image: redis:alpine
    container_name: EcommerceRedis_Prod
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network

  backend:
    image: ${DOCKER_USERNAME}/ecommerce-backend:latest
    container_name: EcommerceAPI_Prod
    ports:
      - "5092:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=${DB_HOST};Database=EcommerceDB;User Id=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=True;
      - ConnectionStrings__Redis=redis:6379
      - JwtSettings__Secret=${JWT_SECRET}
      - MoMo__AccessKey=${MOMO_ACCESS_KEY}
      - MoMo__SecretKey=${MOMO_SECRET_KEY}
      - EmailSettings__Password=${EMAIL_PASSWORD}
    depends_on:
      - redis
    networks:
      - ecommerce-network

  frontend:
    image: ${DOCKER_USERNAME}/ecommerce-frontend:latest
    container_name: EcommerceWeb_Prod
    depends_on:
      - backend
    networks:
      - ecommerce-network

  # --- Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: NginxProxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - ecommerce-network

  # --- Monitoring Services ---
  prometheus:
    image: prom/prometheus:latest
    container_name: Prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - ecommerce-network

  grafana:
    image: grafana/grafana:latest
    container_name: Grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - ecommerce-network

volumes:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ecommerce-network:
    driver: bridge
