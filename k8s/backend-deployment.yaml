apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-backend
  labels:
    app: ecommerce-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-backend
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
      - name: backend
        image: your_dockerhub_username/ecommerce-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Production"
        - name: ConnectionStrings__Redis
          value: "redis:6379"
        # Bổ sung chuỗi kết nối RDS (Thay YOUR_RDS_PASSWORD bằng mật khẩu thật của bạn)
        - name: ConnectionStrings__DefaultConnection
          value: "Server=iluminaty-shop.c30w2ic6wqx6.ap-southeast-2.rds.amazonaws.com,1433;Database=EcommerceDb;User Id=admin;Password=YOUR_RDS_PASSWORD;TrustServerCertificate=True"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: LoadBalancer
  selector:
    app: ecommerce-backend
  ports:
    - protocol: TCP
      port: 5092
      targetPort: 8080
