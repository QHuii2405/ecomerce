name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: Build & Kiểm tra Backend ---
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WebAPI/WebAPI.csproj

      - name: Build Backend
        run: dotnet build src/WebAPI/WebAPI.csproj --configuration Release --no-restore

  # --- JOB 2: Build & Kiểm tra Frontend ---
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ecommerce-web/package-lock.json'

      - name: Install Dependencies
        working-directory: ./ecommerce-web
        run: npm ci

      - name: Build React App
        working-directory: ./ecommerce-web
        run: npm run build

  # --- JOB 3: CD - Đóng gói Docker & Đẩy lên Docker Hub ---
  # Chỉ chạy Job này nếu đẩy code lên nhánh main VÀ 2 job Build ở trên thành công
  push-docker-image:
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Đăng nhập vào Docker Hub
        run: docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./ecommerce-web
          file: ./ecommerce-web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest
