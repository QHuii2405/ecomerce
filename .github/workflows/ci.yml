name: CI Pipeline

# 1. KHI NÀO PIPELINE CHẠY?
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. CÁC CÔNG VIỆC CẦN LÀM (JOBS)
jobs:
  # --- JOB 1: Build & Test Backend (.NET) ---
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WebAPI/WebAPI.csproj

      - name: Build Backend
        run: dotnet build src/WebAPI/WebAPI.csproj --configuration Release --no-restore

      # Chạy Test nếu có
      # - name: Test
      #   run: dotnet test src/WebAPI/WebAPI.csproj --no-build --verbosity normal

  # --- JOB 2: Build Frontend (React) ---
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ecommerce-web/package-lock.json'

      - name: Install Dependencies
        working-directory: ./ecommerce-web
        run: npm ci

      - name: Build React App
        working-directory: ./ecommerce-web
        run: npm run build
