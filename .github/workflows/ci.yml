name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- JOB 1: Build & Kiểm tra Backend ---
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/WebAPI/WebAPI.csproj

      - name: Build Backend
        run: dotnet build src/WebAPI/WebAPI.csproj --configuration Release --no-restore

  # --- JOB 2: Build & Kiểm tra Frontend ---
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './ecommerce-web/package-lock.json'

      - name: Install Dependencies
        working-directory: ./ecommerce-web
        run: npm ci

      - name: Build React App
        working-directory: ./ecommerce-web
        run: npm run build

  # --- JOB 3: CD - Đóng gói Docker & Đẩy lên Docker Hub ---
  # Chỉ chạy Job này nếu đẩy code lên nhánh main VÀ 2 job Build ở trên thành công
  push-docker-image:
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Đăng nhập vào Docker Hub (Máy lọc siêu cấp)
        env:
          DOCKER_USER: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASS: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          # Loại bỏ tất cả các ký tự KHÔNG phải là chữ cái, số, và dấu gạch dưới
          # Điều này sẽ tiêu diệt mọi dấu cách tàng hình, ký tự Tiếng Việt, v.v.
          CLEAN_USER=$(echo -n "$DOCKER_USER" | tr -cd '[:alnum:]')
          CLEAN_PASS=$(echo -n "$DOCKER_PASS" | tr -cd '[:alnum:]_')
          
          echo "Đăng nhập với Username: $CLEAN_USER"
          docker login -u "$CLEAN_USER" -p "$CLEAN_PASS"

      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest

      - name: DevSecOps - Quét lỗ hổng bảo mật Backend Image với Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./ecommerce-web
          file: ./ecommerce-web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest
          build-args: |
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}

      - name: DevSecOps - Quét lỗ hổng bảo mật Frontend Image với Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # --- JOB 4: CD - Tự động triển khai lên AWS EC2 ---
  deploy-to-aws:
    needs: [push-docker-image]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Copy deployment files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.prod.yml,prometheus/,nginx/"
          target: "/home/ubuntu/ecommerce"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MOMO_ACCESS_KEY: ${{ secrets.MOMO_ACCESS_KEY }}
          MOMO_SECRET_KEY: ${{ secrets.MOMO_SECRET_KEY }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DOCKER_USERNAME,DB_HOST,DB_USER,DB_PASSWORD,JWT_SECRET,MOMO_ACCESS_KEY,MOMO_SECRET_KEY,EMAIL_PASSWORD
          script: |
            cd /home/ubuntu/ecommerce
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -a -f
